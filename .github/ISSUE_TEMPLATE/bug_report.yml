name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of polymarket-trader-mcp are you using?
      placeholder: "e.g. 1.5.1"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Code (CLI)
        - Claude Desktop
        - Cursor
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Execution Mode
      description: Are you running in preview or live mode?
      options:
        - Preview (default)
        - Live
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what happened vs. what you expected.
      placeholder: |
        What happened:
        What I expected:
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run tool `markets_search` with ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error messages or logs.
      render: shell

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g. 22.0.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 15.4, Ubuntu 24.04"
