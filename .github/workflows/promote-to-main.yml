name: Promote develop to main

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.confirm == 'promote'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main develop
          AHEAD=$(git rev-list --count origin/main..origin/develop)
          echo "commits_ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "Develop is $AHEAD commits ahead of main"

      - name: Create PR
        if: steps.check.outputs.commits_ahead > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head develop --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
          else
            gh pr create \
              --base main \
              --head develop \
              --title "Release: promote develop to main" \
              --body "Automated promotion from develop branch.

          ## Changes
          $(git log --oneline origin/main..origin/develop)

          ---
          Auto-generated by promote-to-main workflow."
          fi
