name: Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: read

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: develop
          fetch-depth: 0

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..origin/develop)
          echo "commits_ahead=$AHEAD" >> $GITHUB_OUTPUT
          if [ "$AHEAD" -eq 0 ]; then
            echo "::error::develop has no new commits over main"
            exit 1
          fi
          CHANGES=$(git log --oneline origin/main..origin/develop)
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Bump version on develop
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "$BUMP" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push origin develop

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          AHEAD: ${{ steps.check.outputs.commits_ahead }}
          CHANGES: ${{ steps.check.outputs.changes }}
          BUMP: ${{ inputs.bump }}
        run: |
          EXISTING=$(gh pr list --base main --head develop --state open --json number -q '.[0].number')
          BODY=$(cat <<'EOF'
          ## Release v__VERSION__

          **Version bump:** __BUMP__
          **Commits:** __AHEAD__ new commits from develop

          ### Changes
          __CHANGES__

          ---
          After merging, create the release tag:
          ```bash
          git checkout main && git pull
          git tag v__VERSION__ && git push origin v__VERSION__
          ```
          Or run: `gh workflow run release.yml` if tag-on-merge is set up.
          EOF
          )
          BODY=${BODY//__VERSION__/$VERSION}
          BODY=${BODY//__BUMP__/$BUMP}
          BODY=${BODY//__AHEAD__/$AHEAD}
          BODY=${BODY//__CHANGES__/$CHANGES}

          if [ -n "$EXISTING" ]; then
            echo "Updating existing PR #$EXISTING"
            gh pr edit "$EXISTING" \
              --title "Release v${VERSION}" \
              --body "$BODY"
            echo "Updated PR #$EXISTING"
          else
            gh pr create \
              --base main \
              --head develop \
              --title "Release v${VERSION}" \
              --body "$BODY"
          fi

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUMP: ${{ inputs.bump }}
          AHEAD: ${{ steps.check.outputs.commits_ahead }}
        run: |
          {
            echo "## Release PR created"
            echo ""
            echo "- Version: **v${VERSION}** (${BUMP} bump)"
            echo "- Commits from develop: **${AHEAD}**"
            echo "- **Next:** Review and merge the PR, then push the tag"
          } >> $GITHUB_STEP_SUMMARY
