name: Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: read

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: develop
          fetch-depth: 0

      - name: Check if develop is ahead of main
        id: check
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..origin/develop)
          echo "commits_ahead=$AHEAD" >> $GITHUB_OUTPUT
          if [ "$AHEAD" -eq 0 ]; then
            echo "::error::develop has no new commits over main"
            exit 1
          fi
          CHANGES=$(git log --oneline origin/main..origin/develop)
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Bump version on develop
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push origin develop

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          AHEAD=${{ steps.check.outputs.commits_ahead }}

          EXISTING=$(gh pr list --base main --head develop --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing PR #$EXISTING"
            gh pr edit "$EXISTING" \
              --title "Release v${VERSION}" \
              --body "$(cat <<EOF
          ## Release v${VERSION}

          **Version bump:** ${{ inputs.bump }}
          **Commits:** ${AHEAD} new commits from develop

          ### Changes
          ${{ steps.check.outputs.changes }}

          ---
          After merging, create the release tag:
          \`\`\`bash
          git checkout main && git pull
          git tag v${VERSION} && git push origin v${VERSION}
          \`\`\`
          Or run: \`gh workflow run release.yml\` if tag-on-merge is set up.
          EOF
          )"
            echo "Updated PR #$EXISTING"
          else
            gh pr create \
              --base main \
              --head develop \
              --title "Release v${VERSION}" \
              --body "$(cat <<EOF
          ## Release v${VERSION}

          **Version bump:** ${{ inputs.bump }}
          **Commits:** ${AHEAD} new commits from develop

          ### Changes
          ${{ steps.check.outputs.changes }}

          ---
          After merging, create the release tag:
          \`\`\`bash
          git checkout main && git pull
          git tag v${VERSION} && git push origin v${VERSION}
          \`\`\`
          EOF
          )"
          fi

      - name: Summary
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "## Release PR created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: **v${VERSION}** (${{ inputs.bump }} bump)" >> $GITHUB_STEP_SUMMARY
          echo "- Commits from develop: **${{ steps.check.outputs.commits_ahead }}**" >> $GITHUB_STEP_SUMMARY
          echo "- **Next:** Review and merge the PR, then push the tag" >> $GITHUB_STEP_SUMMARY
