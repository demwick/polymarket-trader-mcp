<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="glow3c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0088ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#080c14"/>
  <!-- Hexagon frame -->
  <polygon points="256,60 430,160 430,352 256,452 82,352 82,160"
    stroke="url(#glow3c)" stroke-width="3" fill="none" opacity="0.3"/>
  <!-- Inner hexagon -->
  <polygon points="256,100 400,185 400,330 256,415 112,330 112,185"
    stroke="url(#glow3c)" stroke-width="1.5" fill="none" opacity="0.12"/>
  <!-- PTM monogram - interlocking -->
  <text x="256" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="140" font-weight="800" letter-spacing="-2" fill="url(#glow3c)">PTM</text>
  <!-- Small chart line through letters -->
  <polyline points="120,260 180,240 230,255 280,210 330,230 390,180"
    stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <circle cx="390" cy="180" r="5" fill="white" opacity="0.7"/>
</svg>
